{% extends 'base.html' %}

{% block title %}Supprimer fournisseur{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h3>Confirmation de suppression</h3>
                </div>
                <div class="card-body text-center">
                    <p class="fs-5">Êtes-vous sûr de vouloir supprimer le fournisseur :</p>
                    <h4 class="text-danger">{{ fournisseur.nom }}</h4>
                    <p class="text-muted">({{ fournisseur.code_fournisseur }})</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2">
                            <a href="{% url 'stock:liste_fournisseurs' %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
