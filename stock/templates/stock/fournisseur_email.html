{% extends 'base.html' %}

{% block title %}Envoyer email à {{ fournisseur.nom }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3><i class="fas fa-envelope"></i> Envoyer un email</h3>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <strong>Destinataire :</strong> {{ fournisseur.nom }}<br>
                        <strong>Email :</strong> {{ fournisseur.email }}<br>
                        <strong>Contact :</strong> {{ fournisseur.contact_nom }}
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Sujet</label>
                            <input type="text" name="sujet" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea name="message" class="form-control" rows="10" required></textarea>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'stock:liste_fournisseurs' %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i> Envoyer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
