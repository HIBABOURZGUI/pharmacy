{% extends 'base.html' %}

{% block title %}Mon profil - Pharmacie H.I.B{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"><i class="fas fa-id-card"></i> Mon profil</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nom d'utilisateur</label>
                                <input type="text" class="form-control" value="{{ user.username }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Rôle</label>
                                <input type="text" class="form-control" value="{{ user.profile.get_role_display }}" disabled>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" value="{{ user.email }}" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Téléphone</label>
                            <input type="text" name="telephone" value="{{ user.profile.telephone }}" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Adresse</label>
                            <textarea name="adresse" class="form-control" rows="3">{{ user.profile.adresse }}</textarea>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'stock:liste_medicaments' %}" class="btn btn-secondary">Retour</a>
                            <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
