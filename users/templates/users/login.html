{% extends 'base.html' %}

{% block title %}Connexion - Pharmacie H.I.B{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3><i class="fas fa-sign-in-alt"></i> Connexion</h3>
                </div>
                <div class="card-body">
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle"></i> Nom d'utilisateur ou mot de passe incorrect.
                        </div>
                    {% endif %}
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Email ou nom d'utilisateur</label>
                            <input type="text" name="username" id="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Mot de passe</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <a href="{% url 'users:forgot_password_request' %}" class="text-muted small">
                                <i class="fas fa-question-circle"></i> Mot de passe oublié ?
                            </a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-key"></i> Se connecter
                        </button>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <p class="mb-0">Pas encore de compte ? <a href="{% url 'register' %}">Inscrivez-vous</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
